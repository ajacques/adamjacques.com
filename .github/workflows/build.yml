name: Development Build
on:
  push:
    branches:
    - master
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set short commit hash in env
        run: echo "COMMIT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
      - name: Set up QEMU for multi platform image build
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Dockerhub
        uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_ACCESS }}
      - name: Build and Push docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ./Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          platforms: linux/amd64
          outputs: type=image,compression=zstd,push=${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ajacques/resume_website:${{ env.COMMIT_SHA }}

      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Generate and attach SBOM
        if: github.event_name == 'push'
        uses: anchore/sbom-action@v0
        with:
          image: ajacques/resume_website:${{ env.COMMIT_SHA }}
          output-format: spdx-json
          attachment-name: sbom.spdx.json
        env:
          ANCHORE_CRANE_ENABLED: 1

      - name: Sign image with cosign
        if: github.event_name == 'push'
        run: cosign sign --yes ajacques/resume_website:${{ env.COMMIT_SHA }}

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ./Dockerfile
          target: test
          builder: ${{ steps.buildx.outputs.name }}
          platforms: linux/amd64
          load: true
          tags: resume_website:test
      - name: Run tests
        run: docker run --rm resume_website:test

      # Deploy
      - uses: azure/setup-kubectl@v4
        if: github.event_name == 'push'
      - uses: azure/k8s-set-context@v4
        if: github.event_name == 'push'
        with:
          method: kubeconfig
          kubeconfig: '${{ secrets.KUBECONFIG_FILE }}'
        id: setcontext
      - uses: Azure/k8s-deploy@v5
        if: github.event_name == 'push'
        with:
          namespace: 'personalsites'
          manifests: |
            k8s/deployment.yaml
            k8s/upload-cron.yaml
          images: ajacques/resume_website:${{ env.COMMIT_SHA }}
